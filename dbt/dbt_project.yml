name: "world2045"
version: "1.0.0"
config-version: 2

profile: "world2045"

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
seed-paths: ["seeds"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

vars:
  constant_usd_base_year: 2021
  year_start: 1945
  year_end: 2100

models:
  world2045:
    +persist_docs:
      relation: true
      columns: true

    # Global defaults
    +materialized: table
    +on_schema_change: "sync_all_columns"

    # Single-dataset convention (Option B)
    silver:
      +schema: "{{ env_var('DBT_DATASET', 'world2045_ci') }}"

      facts:
        +materialized: incremental
        +incremental_strategy: merge
        +unique_key: ["country_iso3", "year"]
        +partition_by:
          field: year
          data_type: int64
          range:
            start: 1950
            end: 2101
            interval: 1
        +cluster_by: ["country_iso3"]
        # REQUIRED when incremental + contracts enforced
        +on_schema_change: "append_new_columns"

      indicators:
        +materialized: incremental
        +incremental_strategy: merge
        +unique_key: ["country_iso3", "year", "indicator"]
        +partition_by:
          field: year
          data_type: int64
          range:
            start: 1950
            end: 2101
            interval: 1
        +cluster_by: ["country_iso3", "indicator"]
        # REQUIRED when incremental + contracts enforced
        +on_schema_change: "append_new_columns"

    gold:
      +schema: "{{ env_var('DBT_DATASET', 'world2045_ci') }}"
      +materialized: table
      +cluster_by: ["country_iso3"]

seeds:
  world2045:
    +schema: "{{ env_var('DBT_DATASET', 'world2045_ci') }}"
    +quote_columns: false

    country_overrides:
      +enabled: true
      +column_types:
        iso3: string
        country_name: string
        country_name_official: string
        iso2: string
        iso_numeric: string
        region: string
        subregion: string
        income_group: string
        is_sovereign: bool
        is_disputed: bool
        valid_from_year: int64
        valid_to_year: int64
        predecessor_iso3: string
        successor_iso3: string