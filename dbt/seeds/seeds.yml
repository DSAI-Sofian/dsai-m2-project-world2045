version: 2

seeds:
  - name: wid_inequality_extract
    description: >
      Filtered WID inequality extract containing gini and selected
      pre-tax income share series by percentile.

  - name: ml_climate_vulnerability_projection_2024_2045
    description: >
      Sprint 3 ML climate-vulnerability projection artifact for 2024-2045,
      shaped to the structural-risk projection contract and produced from
      Sprint 2B validated training outputs.
    columns:
      - name: country_iso3
        tests:
          - not_null
      - name: year
        tests:
          - not_null
      - name: scenario_id
        tests:
          - not_null
      - name: indicator_name
        tests:
          - not_null
      - name: projected_value
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - country_iso3
              - year
              - scenario_id
              - indicator_name
