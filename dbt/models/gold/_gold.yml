version: 2

models:
  - name: gold__mart_world2045_features_country_year
    description: >
      Country-year analytical mart for World2045 modeling, forecasting,
      and comparative development analysis across population, economy,
      health, education, inequality, infrastructure, governance,
      climate risk, conflict, and human development.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - country_iso3
              - year

    columns:
      - name: country_iso3
        data_type: string
        description: "ISO 3166-1 alpha-3 country code."
        tests:
          - not_null

      - name: year
        data_type: int64
        description: "Calendar year."
        tests:
          - not_null

      - name: population_total
        data_type: numeric
        description: "Total population."

      - name: gdp_current_usd
        data_type: numeric
        description: "GDP in current USD."

      - name: gdp_per_capita_current_usd
        data_type: numeric
        description: "GDP per capita in current USD."

      - name: gdp_growth_pct
        data_type: numeric
        description: "Annual GDP growth percent."

      - name: unemployment_pct
        data_type: numeric
        description: "Total unemployment rate percent."

      - name: youth_unemployment_pct
        data_type: numeric
        description: "Youth unemployment rate percent for ages 15-24."

      - name: inflation_cpi_pct
        data_type: numeric
        description: "Consumer price inflation percent."

      - name: life_expectancy_years
        data_type: numeric
        description: "Life expectancy at birth in years."

      - name: infant_mortality_per_1000
        data_type: numeric
        description: "Infant mortality rate per 1,000 live births."

      - name: under5_mortality_per_1000
        data_type: numeric
        description: "Under-5 mortality rate per 1,000 live births."

      - name: maternal_mortality_per_100k
        data_type: numeric
        description: "Maternal mortality ratio per 100,000 live births."

      - name: physicians_per_1000
        data_type: numeric
        description: "Physicians per 1,000 people."

      - name: hospital_beds_per_1000
        data_type: numeric
        description: "Hospital beds per 1,000 people."

      - name: health_expenditure_pct_gdp
        data_type: numeric
        description: "Current health expenditure as a percent of GDP."

      - name: primary_enrollment_pct
        data_type: numeric
        description: "Primary school enrollment percent."

      - name: secondary_enrollment_pct
        data_type: numeric
        description: "Secondary school enrollment percent."

      - name: tertiary_enrollment_pct
        data_type: numeric
        description: "Tertiary school enrollment percent."

      - name: education_expenditure_pct_gdp
        data_type: numeric
        description: "Government expenditure on education as a percent of GDP."

      - name: secondary_enrollment_gross_pct
        data_type: numeric
        description: "Gross secondary enrollment percent from the education fact table."

      - name: gini_index
        data_type: numeric
        description: "WDI Gini index measuring income inequality."

      - name: income_share_lowest_20_pct
        data_type: numeric
        description: "WDI income share held by the lowest 20 percent of the population."

      - name: hdi
        data_type: numeric
        description: "UNDP Human Development Index at country-year grain."

      - name: gini_income
        data_type: numeric
        description: "WID income Gini measure at country-year grain."

      - name: bottom50_income_share_pct
        data_type: numeric
        description: "Income share received by the bottom 50 percent of the population."

      - name: top10_income_share_pct
        data_type: numeric
        description: "Income share received by the top 10 percent of the population."

      - name: top1_income_share_pct
        data_type: numeric
        description: "Income share received by the top 1 percent of the population."

      - name: internet_users_pct
        data_type: numeric
        description: "Individuals using the internet percent."

      - name: access_to_electricity_pct
        data_type: numeric
        description: "Population with access to electricity percent."

      - name: poverty_headcount_pct
        data_type: numeric
        description: "Poverty headcount ratio percent."

      - name: vdem_liberal_democracy_index
        data_type: numeric
        description: "V-Dem liberal democracy index at country-year grain."

      - name: vdem_electoral_democracy_index
        data_type: numeric
        description: "V-Dem electoral democracy index at country-year grain."

      - name: vdem_judicial_constraints_index
        data_type: numeric
        description: "V-Dem judicial constraints index at country-year grain."

      - name: vdem_civil_liberties_index
        data_type: numeric
        description: "V-Dem civil liberties index at country-year grain."

      - name: ndgain_index
        data_type: numeric
        description: "ND-GAIN overall country index."

      - name: climate_vulnerability
        data_type: numeric
        description: "ND-GAIN climate vulnerability component."

      - name: adaptation_readiness
        data_type: numeric
        description: "ND-GAIN adaptation readiness component."

      - name: battle_deaths
        data_type: numeric
        description: "Estimated battle-related deaths for the country-year."

      - name: conflict_incidence
        data_type: bool
        description: "True when at least one conflict is recorded in the country-year."

      - name: interstate_conflict
        data_type: bool
        description: "True when interstate conflict is recorded."

      - name: civil_conflict
        data_type: bool
        description: "True when civil conflict is recorded."

      - name: internationalized_conflict
        data_type: bool
        description: "True when internationalized intrastate conflict is recorded."

      - name: war_intensity
        data_type: bool
        description: "True when conflict reaches war-intensity threshold."

      - name: population_available
        data_type: bool
        description: "True when population data is available for the country-year."

      - name: gdp_available
        data_type: bool
        description: "True when GDP data is available for the country-year."

      - name: life_expectancy_available
        data_type: bool
        description: "True when life expectancy data is available for the country-year."

      - name: secondary_enrollment_available
        data_type: bool
        description: "True when secondary enrollment data is available for the country-year."

      - name: internet_available
        data_type: bool
        description: "True when internet usage data is available for the country-year."

      - name: inequality_available
        data_type: bool
        description: "True when at least one inequality indicator is available for the country-year."

      - name: health_available
        data_type: bool
        description: "True when at least one health expenditure or health system indicator is available for the country-year."

      - name: hdi_available
        data_type: bool
        description: "True when HDI data is available for the country-year."

      - name: governance_available
        data_type: bool
        description: "True when governance data is available for the country-year."

      - name: vdem_liberal_democracy_available
        data_type: bool
        description: "True when liberal democracy index is populated."

      - name: vdem_electoral_democracy_available
        data_type: bool
        description: "True when electoral democracy index is populated."

      - name: vdem_judicial_constraints_available
        data_type: bool
        description: "True when judicial constraints index is populated."

      - name: vdem_civil_liberties_available
        data_type: bool
        description: "True when civil liberties index is populated."

      - name: climate_available
        data_type: bool
        description: "True when ND-GAIN climate indicators are available."

      - name: conflict_available
        data_type: bool
        description: "True when conflict indicators are available."

  - name: gold__features_world2045_normalized_country_year
    description: >
      Country-year normalized feature layer for World2045.
      Raw features are direction-aligned so that higher values indicate
      better development outcomes, then standardized using global z-scores.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - country_iso3
              - year

    columns:
      - name: country_iso3
        data_type: string
        description: "ISO 3166-1 alpha-3 country code."
        tests:
          - not_null

      - name: year
        data_type: int64
        description: "Calendar year."
        tests:
          - not_null

      - name: hdi
        data_type: numeric
        description: "Raw Human Development Index."

      - name: gini_income
        data_type: numeric
        description: "Raw income Gini measure."

      - name: bottom50_income_share_pct
        data_type: numeric
        description: "Raw income share of the bottom 50 percent."

      - name: top10_income_share_pct
        data_type: numeric
        description: "Raw income share of the top 10 percent."

      - name: top1_income_share_pct
        data_type: numeric
        description: "Raw income share of the top 1 percent."

      - name: hdi_aligned
        data_type: numeric
        description: "Direction-aligned HDI where higher is better."

      - name: gini_income_aligned
        data_type: numeric
        description: "Direction-aligned Gini where higher is better after sign inversion."

      - name: bottom50_income_share_pct_aligned
        data_type: numeric
        description: "Direction-aligned bottom 50 percent income share where higher is better."

      - name: top10_income_share_pct_aligned
        data_type: numeric
        description: "Direction-aligned top 10 percent income share where higher is better after sign inversion."

      - name: top1_income_share_pct_aligned
        data_type: numeric
        description: "Direction-aligned top 1 percent income share where higher is better after sign inversion."

      - name: hdi_zscore
        data_type: numeric
        description: "Z-score normalized HDI."

      - name: gini_income_zscore
        data_type: numeric
        description: "Z-score normalized direction-aligned Gini."

      - name: bottom50_income_share_pct_zscore
        data_type: numeric
        description: "Z-score normalized direction-aligned bottom 50 percent income share."

      - name: top10_income_share_pct_zscore
        data_type: numeric
        description: "Z-score normalized direction-aligned top 10 percent income share."

      - name: top1_income_share_pct_zscore
        data_type: numeric
        description: "Z-score normalized direction-aligned top 1 percent income share."

  - name: gold__profile_indicator_coverage_by_year
    description: >
      Year-level coverage profile for key World2045 gold mart indicators across
      the full country-year spine.

    columns:
      - name: year
        data_type: int64
        tests:
          - not_null
          - unique

  - name: gold__profile_indicator_coverage_by_country
    description: >
      Country-level coverage profile for key World2045 indicators across the
      1960-2023 analytic slice.

    columns:
      - name: country_iso3
        data_type: string
        tests:
          - not_null
          - unique

  - name: gold__mart_world2045_model_dataset
    description: >
      Modeling-ready country-year dataset for World2045 forecasting workflows.
      Uses normalized development features, feature completeness scoring,
      and train-versus-forecast usability flags.

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - country_iso3
              - year

    columns:
      - name: country_iso3
        data_type: string
        description: "ISO 3166-1 alpha-3 country code."
        tests:
          - not_null

      - name: year
        data_type: int64
        description: "Calendar year."
        tests:
          - not_null

      - name: hdi_zscore
        data_type: numeric
        description: "Normalized HDI feature."

      - name: gini_income_zscore
        data_type: numeric
        description: "Normalized income Gini feature."

      - name: bottom50_income_share_pct_zscore
        data_type: numeric
        description: "Normalized bottom 50 percent income share feature."

      - name: top10_income_share_pct_zscore
        data_type: numeric
        description: "Normalized top 10 percent income share feature."

      - name: top1_income_share_pct_zscore
        data_type: numeric
        description: "Normalized top 1 percent income share feature."

      - name: hdi
        data_type: numeric
        description: "Annualized HDI value used for transparency and auditability."

      - name: hdi_is_observed
        data_type: bool
        description: "True when HDI is directly observed from the UNDP source."

      - name: hdi_is_interpolated
        data_type: bool
        description: "True when HDI is derived by interpolation between observed anchor years."

      - name: non_null_feature_count
        data_type: int64
        description: "Count of populated normalized features in the row."

      - name: is_model_usable
        data_type: bool
        description: "True when the row passes the minimum completeness threshold for modeling."

      - name: is_training_usable
        data_type: bool
        description: "True when the row is in the observed training period and passes completeness threshold."

      - name: is_scoring_usable
        data_type: bool
        description: "True when the row is in the forecast period and passes completeness threshold."

      - name: panel_period
        data_type: string
        description: "Panel segmentation label for pre-HDI, observed training, or forecast periods."