version: 2

models:
  - name: dim_country
    description: >
      Canonical country dimension (ISO-3166-1 alpha-3) built from the
      `country_overrides` seed. In the single-dataset convention, this model is
      materialized as `silver__dim_country` in the dataset defined by `DBT_DATASET`
      (or `target.dataset` when DBT_DATASET is not set).
    config:
      contract:
        enforced: true
    columns:
      - name: country_iso3
        data_type: string
        description: "ISO-3166-1 alpha-3 code (canonical PK)."
        tests: [not_null, unique]

      - name: country_name
        data_type: string
        description: "Primary display name."
        tests: [not_null]

      - name: country_name_official
        data_type: string
      - name: country_iso2
        data_type: string
      - name: country_numeric
        data_type: string
      - name: region
        data_type: string
      - name: subregion
        data_type: string
      - name: income_group
        data_type: string

      - name: is_sovereign
        data_type: bool
      - name: is_disputed
        data_type: bool

      - name: valid_from_year
        data_type: int64
      - name: valid_to_year
        data_type: int64

      - name: predecessor_iso3
        data_type: string
      - name: successor_iso3
        data_type: string

      - name: created_at
        data_type: timestamp
      - name: updated_at
        data_type: timestamp

  - name: dim_year
    description: >
      Year dimension from 1945 to 2100. Materialized as `silver__dim_year`
      in the dataset defined by `DBT_DATASET` (or `target.dataset`).
    config:
      contract:
        enforced: true
    columns:
      - name: year
        data_type: int64
        tests: [not_null, unique]

      - name: decade
        data_type: int64
        tests: [not_null]

      - name: post_ww2_flag
        data_type: bool
        tests: [not_null]

      - name: created_at
        data_type: timestamp
      - name: updated_at
        data_type: timestamp

  - name: fact_country_year_spine
    description: >
      Canonical country-year spine containing all valid (country_iso3, year)
      combinations. All conformed facts must left-join to this spine.
      Materialized as `silver__fact_country_year_spine` in the dataset defined
      by `DBT_DATASET` (or `target.dataset`).
    config:
      contract:
        enforced: true
    columns:
      - name: country_iso3
        data_type: string
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_country')
                field: country_iso3

      - name: year
        data_type: int64
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_year')
                field: year

      - name: is_valid_entity_year
        data_type: bool
        tests: [not_null]

      - name: created_at
        data_type: timestamp
      - name: updated_at
        data_type: timestamp

      - name: country_year_key
        data_type: string
        description: "Deterministic MD5 hash of country_iso3 + year."
        tests:
          - not_null
          - unique

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: ['country_iso3', 'year']

  - name: silver__wdi_country_year_long
    description: >
      Cleaned World Development Indicators dataset at country-year-indicator grain.
      Materialized as `silver__wdi_country_year_long` in the dataset defined by
      `DBT_DATASET` (or `target.dataset`).

    columns:
      - name: source_system
        data_type: string

      - name: dataset_code
        data_type: string

      - name: country_id
        data_type: string

      - name: country_name
        data_type: string

      - name: country_iso3
        data_type: string
        tests: [not_null]

      - name: year
        data_type: int64
        tests: [not_null]

      - name: indicator_id
        data_type: string
        tests: [not_null]

      - name: indicator_name
        data_type: string

      - name: value
        data_type: numeric
        tests: [not_null]

      - name: unit
        data_type: string

      - name: obs_status
        data_type: string

      - name: decimal
        data_type: int64

      - name: ingested_at
        data_type: timestamp

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: ['country_iso3', 'year', 'indicator_id']
  
  - name: silver__fact_governance_country_year
    description: >
      Country-year governance indicators conformed from V-Dem for analytical use. Materialized as `silver__fact_governance_country_year` in the dataset defined by `DBT_DATASET` (or `target.dataset`).
    
    columns:
    - name: country_iso3
      data_type: string
      description: "ISO-3166-1 alpha-3 country code."
      tests:
        - not_null
        - relationships:
            arguments:
              to: ref('dim_country')
              field: country_iso3

    - name: year
      data_type: int64
      description: "Calendar year."
      tests:
        - not_null
        - relationships:
            arguments:
              to: ref('dim_year')
              field: year

    - name: vdem_liberal_democracy_index
      data_type: float64
      description: "V-Dem liberal democracy index."

    - name: vdem_electoral_democracy_index
      data_type: float64
      description: "V-Dem electoral democracy index."

    - name: vdem_judicial_constraints_index
      data_type: float64
      description: "V-Dem judicial constraints index."

    - name: vdem_civil_liberties_index
      data_type: float64
      description: "V-Dem civil liberties index."

    tests:
    - dbt_utils.unique_combination_of_columns:
        arguments:
          combination_of_columns: ['country_iso3', 'year']

  - name: silver__fact_education_country_year
    description: >
      Country-year education fact table derived from WDI-based enrollment and
      education expenditure indicators for analytical use.

    columns:
      - name: country_iso3
        data_type: string
        description: "ISO-3166-1 alpha-3 country code."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_country')
                field: country_iso3

      - name: year
        data_type: int64
        description: "Calendar year."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_year')
                field: year

      - name: primary_enrollment_pct
        data_type: float64
        description: "Primary school enrollment percent."

      - name: secondary_enrollment_pct
        data_type: float64
        description: "Secondary school enrollment percent."

      - name: secondary_enrollment_gross_pct
        data_type: float64
        description: "Gross secondary school enrollment percent."

      - name: tertiary_enrollment_pct
        data_type: float64
        description: "Tertiary school enrollment percent."

      - name: education_expenditure_pct_gdp
        data_type: float64
        description: "Government expenditure on education as a percent of GDP."

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - country_iso3
            - year

  - name: silver__wdi_country_year_features
    description: >
      Pivoted WDI feature table at country-year grain for selected health,
      education, and inequality indicators used by the World2045 gold mart.

    columns:
      - name: country_iso3
        tests:
          - not_null

      - name: year
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - country_iso3
            - year

  - name: silver__fact_health_country_year
    description: >
      Country-year health fact table derived from conformed WDI-based health indicators.

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - country_iso3
            - year

    columns:
      - name: country_iso3
        data_type: string
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_country')
                field: country_iso3

      - name: year
        data_type: int64
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_year')
                field: year

  - name: silver__fact_inequality_country_year
    description: >
      Country-year inequality and labor stress fact table derived from WDI-based
      inequality, poverty, and unemployment indicators.

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - country_iso3
            - year

    columns:
      - name: country_iso3
        data_type: string
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_country')
                field: country_iso3

      - name: year
        data_type: int64
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_year')
                field: year

  - name: silver__fact_climate_risk_country_year
    description: Country-year climate risk fact from ND-GAIN.
    columns:
      - name: country_iso3
        tests:
          - not_null

      - name: year
        tests:
          - not_null

      - name: ndgain_index

      - name: climate_vulnerability

      - name: adaptation_readiness

  - name: silver__fact_conflict_country_year
    description: Country-year conflict risk fact from UCDP.
    columns:
      - name: country_iso3
        tests:
          - not_null

      - name: year
        tests:
          - not_null

      - name: battle_deaths
        description: Best estimate of battle-related deaths in the country-year.

      - name: conflict_incidence
        description: Indicator for at least one recorded armed conflict in the country-year.

      - name: interstate_conflict
        description: Indicator for interstate conflict in the country-year.

      - name: civil_conflict
        description: Indicator for internal conflict in the country-year.

      - name: internationalized_conflict
        description: Indicator for internationalized internal conflict in the country-year.

      - name: war_intensity
        description: Indicator for war-intensity conflict in the country-year.

  - name: silver__wid_inequality_country_year
    description: >
      Conformed WID inequality distribution metrics at country-year grain,
      mapped from WID alpha2 source codes to canonical country_iso3.
      Metrics are based on pre-tax national income concepts from WID.

    columns:
      - name: country_iso3
        description: Canonical ISO-3166-1 alpha-3 country code.
        data_tests:
          - not_null

      - name: year
        description: Calendar year.
        data_tests:
          - not_null

      - name: gini_income
        description: WID pre-tax national income Gini coefficient.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
                inclusive: true

      - name: bottom50_income_share_pct
        description: Share of pre-tax national income accruing to the bottom 50 percent.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100
                inclusive: true

      - name: top10_income_share_pct
        description: Share of pre-tax national income accruing to the top 10 percent.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100
                inclusive: true

      - name: top1_income_share_pct
        description: Share of pre-tax national income accruing to the top 1 percent.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100
                inclusive: true

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - country_iso3
              - year

  - name: silver__fact_inequality_country_year
    description: >
      Conformed inequality fact table at country-year grain combining WDI
      poverty headcount with WID inequality distribution metrics.

    columns:
      - name: country_iso3
        description: Canonical ISO-3166-1 alpha-3 country code.
        data_tests:
          - not_null

      - name: year
        description: Calendar year.
        data_tests:
          - not_null

      - name: poverty_headcount_pct
        description: Poverty headcount ratio from WDI indicator SI.POV.LMIC.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100
                inclusive: true

      - name: gini_income
        description: WID pre-tax national income Gini coefficient.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
                inclusive: true

      - name: bottom50_income_share_pct
        description: Share of pre-tax national income accruing to the bottom 50 percent.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100
                inclusive: true

      - name: top10_income_share_pct
        description: Share of pre-tax national income accruing to the top 10 percent.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100
                inclusive: true

      - name: top1_income_share_pct
        description: Share of pre-tax national income accruing to the top 1 percent.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100
                inclusive: true

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - country_iso3
              - year

  - name: silver__fact_hdi_country_year
    description: >
      Conformed HDI fact table at country-year grain based on cleaned
      UNDP HDI trends data.

    columns:
      - name: country_iso3
        data_tests:
          - not_null

      - name: year
        data_tests:
          - not_null

      - name: hdi
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
                inclusive: true

    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - country_iso3
              - year