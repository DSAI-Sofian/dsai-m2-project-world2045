version: 2

models:
  - name: silver__projection_population_country_year
    description: "UN WPP 2024 medium-variant country-level demographic projections for 2024-2045."

    columns:
      - name: country_iso3
        tests:
          - not_null
      - name: year
        tests:
          - not_null
      - name: projection_variant
        tests:
          - not_null
      - name: scenario_family
        tests:
          - not_null
      - name: scenario_id
        tests:
          - not_null
      - name: projection_source
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - country_iso3
              - year
              - projection_variant

