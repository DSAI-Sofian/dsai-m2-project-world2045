version: 2

models:
  - name: silver__projection_population_country_year
    description: "UN WPP 2024 medium-variant country-level demographic projections for 2024-2045."

    columns:
      - name: country_iso3
        tests:
          - not_null
      - name: year
        tests:
          - not_null
      - name: projection_variant
        tests:
          - not_null
      - name: scenario_family
        tests:
          - not_null
      - name: scenario_id
        tests:
          - not_null
      - name: projection_source
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - country_iso3
              - year
              - projection_variant

  - name: silver__projection_gdp_country_year
    description: "Conformed SSP2 GDP projection model at country-year grain using processed IIASA/OECD Env-Growth GDP projections."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - country_iso3
              - year

    columns:
      - name: country_iso3
        description: "Canonical ISO3 country code."
        tests:
          - not_null

      - name: year
        description: "Projection year."
        tests:
          - not_null

      - name: scenario_name
        description: "Scenario retained from the SSP GDP source."

      - name: model_name
        description: "Projection model retained from the SSP GDP source."

      - name: gdp_real_billion_usd
        description: "Projected GDP level in billions of constant USD."

  - name: silver__projection_gdp_country_year_annualized
    description: "Annualized GDP projection model for 2025-2045 using linear interpolation between 5-year SSP2 GDP anchor points."
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - country_iso3
              - year

    columns:
      - name: country_iso3
        tests:
          - not_null

      - name: year
        tests:
          - not_null

      - name: gdp_real_billion_usd
        description: "Interpolated annual GDP projection in billions of constant USD."

      - name: scenario_name
        description: "Scenario retained from the SSP GDP source."

      - name: model_name
        description: "Projection model retained from the SSP GDP source."

  - name: silver__projection_structural_risk_country_year
    description: >
      Sprint 1 placeholder ML projection contract for structural-risk indicators.
      This model defines the target country-year-indicator schema for future ML outputs
      without changing current scenario scoring behavior.
    columns:
      - name: country_iso3
        tests:
          - not_null

      - name: year
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 2024
                max_value: 2045
                inclusive: true

      - name: scenario_id
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - baseline_static_risk
                  - baseline_ml_dynamic_risk

      - name: indicator_name
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - vdem_liberal_democracy_index
                  - adaptation_readiness
                  - climate_vulnerability
                  - conflict_severity

      - name: projected_value
        description: "Placeholder projected value; intentionally null in Sprint 1."

      - name: projection_source
        tests:
          - not_null

      - name: forecast_method
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - ml_placeholder
                  - linear_regression_sklearn

      - name: model_version
        tests:
          - not_null

      - name: created_at
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - country_iso3
              - year
              - scenario_id
              - indicator_name

  - name: silver__ml_structural_risk_panel_country_year
    description: >
      ML-ready country-year panel for structural-risk indicators used in Sprint 2
      training and backtesting workflows.
    columns:
      - name: country_iso3
        tests:
          - not_null

      - name: year
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1995
                max_value: 2023
                inclusive: true

      - name: indicator_name
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - vdem_liberal_democracy_index
                  - adaptation_readiness
                  - climate_vulnerability

      - name: indicator_value
        description: "Observed indicator value used as model target in the observed panel."

      - name: prev_year_value
      - name: rolling_mean_3y
      - name: rolling_mean_5y
      - name: change_3y
      - name: change_5y
      - name: is_indicator_missing
      - name: is_prev_year_missing
      - name: is_rolling_mean_3y_missing
      - name: is_rolling_mean_5y_missing
      - name: created_at
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - country_iso3
              - year
              - indicator_name
