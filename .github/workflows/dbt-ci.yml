name: dbt CI

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main"]

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/.dbt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt (BigQuery)
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-bigquery==1.8.*"

      - name: Write dbt profiles.yml from secret
        run: |
          mkdir -p "${DBT_PROFILES_DIR}"
          printf '%s' "${{ secrets.DBT_PROFILES_YML }}" > "${DBT_PROFILES_DIR}/profiles.yml"

      - name: Write GCP service account key
        run: |
          mkdir -p /home/runner/work/_temp
          printf '%s' "${{ secrets.GCP_SA_KEY }}" > /home/runner/work/_temp/gcp-sa.json

      - name: Debug workspace
        run: |
          pwd
          ls -la
          ls -la dbt || true
          ls -la dbt/dbt_project.yml || true

      - name: Assert dbt project exists
        run: |
          test -d dbt || (echo "dbt/ missing" && exit 1)
          test -f dbt/dbt_project.yml || (echo "dbt_project.yml missing" && exit 1)

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt debug
        working-directory: dbt
        run: dbt debug

      - name: dbt build
        working-directory: dbt
        run: dbt build