name: dbt CI

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main"]

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    env:
      # Keep defaults simple and deterministic
      DBT_PROJECT_DIR: dbt
      DBT_PROFILES_DIR: ${{ github.workspace }}/.dbt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt (BigQuery)
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-bigquery==1.8.*"

      - name: Write dbt profiles.yml from secret
        # Use printf to preserve multiline YAML exactly
        run: |
          mkdir -p "${DBT_PROFILES_DIR}"
          printf '%s' "${{ secrets.DBT_PROFILES_YML }}" > "${DBT_PROFILES_DIR}/profiles.yml"

      - name: Debug workspace
        run: |
          pwd
          ls -la
          echo "DBT_PROJECT_DIR=${DBT_PROJECT_DIR}"
          echo "DBT_PROFILES_DIR=${DBT_PROFILES_DIR}"
          ls -la "${DBT_PROJECT_DIR}" || true
          find "${DBT_PROJECT_DIR}" -maxdepth 2 -type f -print || true

      - name: Assert dbt project exists
        run: |
          test -d "${DBT_PROJECT_DIR}" || (echo "Missing DBT_PROJECT_DIR: ${DBT_PROJECT_DIR}" && exit 1)
          test -f "${DBT_PROJECT_DIR}/dbt_project.yml" || (echo "Missing ${DBT_PROJECT_DIR}/dbt_project.yml" && exit 1)

      - name: dbt deps
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: dbt deps

      - name: dbt debug
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: dbt debug

      - name: dbt build
        working-directory: ${{ env.DBT_PROJECT_DIR }}
        run: dbt build