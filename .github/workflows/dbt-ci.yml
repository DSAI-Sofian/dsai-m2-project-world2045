name: dbt CI

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main"]

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/.dbt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt (BigQuery)
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-bigquery==1.8.*"

      - name: Write dbt profiles.yml from secret
        run: |
          mkdir -p "${DBT_PROFILES_DIR}"
          printf '%s' "${{ secrets.DBT_PROFILES_YML }}" > "${DBT_PROFILES_DIR}/profiles.yml"

      - name: Write & validate GCP service account key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /home/runner/work/_temp

          cat > /home/runner/work/_temp/gcp-sa.json <<'EOF'
${{ secrets.GCP_SA_KEY }}
EOF

          # Normalize potential CRLF line endings
          tr -d '\r' < /home/runner/work/_temp/gcp-sa.json > /home/runner/work/_temp/gcp-sa.clean.json
          mv /home/runner/work/_temp/gcp-sa.clean.json /home/runner/work/_temp/gcp-sa.json

          # Validate JSON
          python - <<'PY'
import json
p="/home/runner/work/_temp/gcp-sa.json"
with open(p,"r",encoding="utf-8") as f:
    json.load(f)
print("Service account JSON validated")
PY

      - name: Assert dbt project exists
        run: |
          test -d dbt || (echo "dbt/ missing" && exit 1)
          test -f dbt/dbt_project.yml || (echo "dbt_project.yml missing" && exit 1)

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt debug
        working-directory: dbt
        run: dbt debug

      - name: dbt build
        working-directory: dbt
        run: dbt build