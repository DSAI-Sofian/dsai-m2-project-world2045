name: dbt CI

on:
  pull_request:
    branches: ["main", "develop"]
  push:
    branches: ["main"]

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/.dbt

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt (BigQuery)
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-bigquery==1.8.*"

      - name: Write & validate GCP service account key (base64)
  shell: bash
  run: |
    set -euo pipefail
    mkdir -p /home/runner/work/_temp
    echo "${{ secrets.GCP_SA_KEY_B64 }}" | base64 -d > /home/runner/work/_temp/gcp-sa.json

    python - <<'PY'
import json
p="/home/runner/work/_temp/gcp-sa.json"
with open(p,"r",encoding="utf-8") as f:
    json.load(f)
print("Service account JSON validated")
PY

      - name: Assert dbt project exists
        run: |
          test -d dbt || (echo "dbt/ missing" && exit 1)
          test -f dbt/dbt_project.yml || (echo "dbt_project.yml missing" && exit 1)

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

- name: Inspect keyfile + profile wiring (safe)
  shell: bash
  run: |
    set -euo pipefail

    echo "=== keyfile exists? ==="
    ls -lah /home/runner/work/_temp || true
    ls -lah /home/runner/work/_temp/gcp-sa.json || true

    echo "=== keyfile first 2 lines (whitespace visible) ==="
    sed -n '1,2p' /home/runner/work/_temp/gcp-sa.json | cat -A

    echo "=== keyfile sha256 (does not reveal content) ==="
    sha256sum /home/runner/work/_temp/gcp-sa.json || true

    echo "=== profiles.yml keyfile line ==="
    grep -n "keyfile" "${DBT_PROFILES_DIR}/profiles.yml" || true

    echo "=== JSON parse check (must PASS) ==="
    python - <<'PY'
import json
p="/home/runner/work/_temp/gcp-sa.json"
with open(p,"r",encoding="utf-8") as f:
    json.load(f)
print("JSON OK")
PY

      - name: dbt debug
        working-directory: dbt
        run: dbt debug

      - name: dbt build
        working-directory: dbt
        run: dbt build