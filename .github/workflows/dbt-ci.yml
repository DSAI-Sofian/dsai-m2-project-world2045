name: dbt CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/.dbt
      KEYFILE_PATH: /home/runner/work/_temp/gcp-sa.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt (BigQuery)
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-bigquery==1.8.*"

      - name: Write profiles.yml from secret
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${DBT_PROFILES_DIR}"
          printf '%s' "${{ secrets.DBT_PROFILES_YML }}" > "${DBT_PROFILES_DIR}/profiles.yml"

          echo "=== profiles.yml keyfile line ==="
          grep -n "keyfile" "${DBT_PROFILES_DIR}/profiles.yml" || true

      - name: Decode keyfile from base64 + validate JSON
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /home/runner/work/_temp

          # Fail fast if secret missing/empty
          test -n "${{ secrets.GCP_SA_KEY_B64 }}" || (echo "ERROR: GCP_SA_KEY_B64 secret missing/empty" && exit 1)

          # Decode
          echo "${{ secrets.GCP_SA_KEY_B64 }}" | base64 -d > "${KEYFILE_PATH}"

          # Normalize CRLF
          tr -d '\r' < "${KEYFILE_PATH}" > "${KEYFILE_PATH}.clean"
          mv "${KEYFILE_PATH}.clean" "${KEYFILE_PATH}"
          chmod 600 "${KEYFILE_PATH}"

          # Fail fast if empty
          test -s "${KEYFILE_PATH}" || (echo "ERROR: Decoded keyfile is empty (bad base64?)" && exit 1)

          # Validate JSON
          python - <<'PY'
import json
p="/home/runner/work/_temp/gcp-sa.json"
with open(p, "r", encoding="utf-8") as f:
    json.load(f)
print("Service account JSON: OK")
PY

      - name: Assert dbt project exists
        shell: bash
        run: |
          set -euo pipefail
          test -d dbt || (echo "ERROR: dbt/ directory missing" && exit 1)
          test -f dbt/dbt_project.yml || (echo "ERROR: dbt/dbt_project.yml missing" && exit 1)
          echo "dbt project: OK"

      - name: dbt deps
        working-directory: dbt
        run: dbt deps

      - name: dbt debug
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.KEYFILE_PATH }}
        working-directory: dbt
        run: dbt debug

      - name: dbt build
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.KEYFILE_PATH }}
        working-directory: dbt
        run: dbt build