name: dbt CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  dbt-build:
    runs-on: ubuntu-latest

    env:
      DBT_PROFILES_DIR: ${{ github.workspace }}/.dbt
      KEYFILE_PATH: /home/runner/work/_temp/gcp-sa.json
      DBT_TARGET: ci
      DBT_DATASET: world2045_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dbt (BigQuery)
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-bigquery==1.8.*"

      - name: Write dbt profiles.yml from secret
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${DBT_PROFILES_DIR}"
          printf '%s' "${{ secrets.DBT_PROFILES_YML }}" > "${DBT_PROFILES_DIR}/profiles.yml"
          echo "=== profiles.yml keyfile line ==="
          grep -n "keyfile" "${DBT_PROFILES_DIR}/profiles.yml" || true

      - name: Decode keyfile from base64 secret + validate JSON
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /home/runner/work/_temp

          # Fail fast if secret missing/empty
          if [ -z "${{ secrets.GCP_SA_KEY_B64 }}" ]; then
            echo "ERROR: GCP_SA_KEY_B64 secret missing/empty"
            exit 1
          fi

          # Decode base64 -> JSON keyfile
          echo "${{ secrets.GCP_SA_KEY_B64 }}" | base64 -d > "${KEYFILE_PATH}"

          # Normalize CRLF just in case
          tr -d '\r' < "${KEYFILE_PATH}" > "${KEYFILE_PATH}.clean"
          mv "${KEYFILE_PATH}.clean" "${KEYFILE_PATH}"
          chmod 600 "${KEYFILE_PATH}"

          # Fail fast if decoded file empty
          if [ ! -s "${KEYFILE_PATH}" ]; then
            echo "ERROR: Decoded keyfile is empty (bad base64?)"
            exit 1
          fi

          # Print only file size (safe)
          echo "Keyfile bytes: $(wc -c < "${KEYFILE_PATH}")"

          # Validate JSON (fail if invalid)
          python -c "import json; json.load(open('${KEYFILE_PATH}','r',encoding='utf-8')); print('Service account JSON: OK')"

      - name: Assert dbt project exists
        shell: bash
        run: |
          set -euo pipefail
          test -d dbt || (echo "ERROR: dbt/ directory missing" && exit 1)
          test -f dbt/dbt_project.yml || (echo "ERROR: dbt/dbt_project.yml missing" && exit 1)

      - name: dbt deps
        working-directory: dbt
        run: dbt deps --target "${DBT_TARGET}"

      - name: dbt debug
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.KEYFILE_PATH }}
        working-directory: dbt
        run: dbt debug --target "${DBT_TARGET}"

      - name: dbt build
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ env.KEYFILE_PATH }}
        working-directory: dbt
        run: dbt build --target "${DBT_TARGET}"
